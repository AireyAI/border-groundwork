<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B0B0B" />
<title>Border Groundwork &amp; Construction — Carlisle</title>
<meta name="description" content="Groundworks, foundations, drainage and driveways across Carlisle, Cumbria &amp; the Scottish Borders." />
<link rel="canonical" href="https://bordergroundworks.co.uk/" />

<link rel="preload" as="video" href="video/intro.mp4" type="video/mp4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;700;800;900&display=swap" rel="stylesheet">

<style>
*{ margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
:root{
  --ink:#0B0B0B; --bone:#F5F2EC; --amber:#EB7526; --amberl:#F78C3D; --silver:#8A8A8A;
}
html,body{ background:#000; color:#fff; font-family:'Archivo', system-ui, sans-serif; height:100%; overflow:hidden; }

.stage{
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#000;
  overflow:hidden;
}
.bgvid{
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  filter:contrast(1.06) saturate(0.9) brightness(0.75);
  transform:scale(1.02);
}
.vignette{
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse at center, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 85%, rgba(0,0,0,0.9) 100%),
    linear-gradient(180deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0) 65%, rgba(0,0,0,0.55) 100%);
  pointer-events:none;
  z-index:1;
}
.grain{
  position:absolute; inset:0; z-index:2;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.08  0 0 0 0 0.08  0 0 0 0 0.08  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.45'/></svg>");
  mix-blend-mode:overlay; opacity:.3; pointer-events:none;
}

.frame{
  position:absolute; inset:28px;
  border:1px solid rgba(255,255,255,0.12);
  pointer-events:none; z-index:3;
}
.bracket{ position:absolute; width:28px; height:28px; border:1px solid var(--amber); pointer-events:none; z-index:4; }
.bracket.tl{ top:20px; left:20px; border-right:0; border-bottom:0; }
.bracket.tr{ top:20px; right:20px; border-left:0; border-bottom:0; }
.bracket.bl{ bottom:20px; left:20px; border-right:0; border-top:0; }
.bracket.br{ bottom:20px; right:20px; border-left:0; border-top:0; }
@media (min-width:768px){
  .bracket{ width:44px; height:44px; }
  .frame{ inset:40px; }
}

/* Meta top/bottom bars */
.meta{
  position:absolute; z-index:5;
  font-family:'Archivo';
  font-weight:700;
  letter-spacing:0.28em;
  text-transform:uppercase;
  font-size:10px;
  color:var(--amberl);
  display:flex; align-items:center; gap:10px;
}
.meta .dot{ width:6px; height:6px; background:var(--amber); border-radius:50%; animation: blink 1.6s ease-in-out infinite; }
@keyframes blink{ 0%,100%{opacity:0.2} 50%{opacity:1} }

.meta.tl{ top:44px; left:44px; }
.meta.tr{ top:44px; right:44px; color:rgba(255,255,255,0.55); }
.meta.bl{ bottom:44px; left:44px; color:rgba(255,255,255,0.55); }
.meta.br{ bottom:44px; right:44px; color:rgba(255,255,255,0.55); font-size:10px; }
@media (max-width:640px){
  .meta{ font-size:9px; letter-spacing:0.2em; }
  .meta.tl{ top:30px; left:30px; }
  .meta.tr{ display:none; }
  .meta.bl{ display:none; }
  .meta.br{ bottom:30px; right:30px; }
}

/* Centre content */
.center{
  position:relative; z-index:6;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:0 24px;
  text-align:center;
  opacity:0; animation: fadeIn 1.2s 0.5s cubic-bezier(.2,.8,.2,1) forwards;
}
@keyframes fadeIn{ from{opacity:0; transform:translateY(12px)} to{opacity:1; transform:translateY(0)} }

.logo-badge{
  background:var(--bone);
  padding:10px 14px;
  margin-bottom:28px;
  display:inline-flex;
}
.logo-badge img{ height:46px; width:auto; display:block; }

.eyebrow{
  font-family:'Archivo';
  font-weight:700;
  font-size:11px;
  letter-spacing:0.34em;
  text-transform:uppercase;
  color:var(--amberl);
  margin-bottom:20px;
}

.headline{
  font-family:'Archivo';
  font-weight:300;
  text-transform:uppercase;
  line-height:0.95;
  letter-spacing:-0.02em;
  font-size:clamp(38px, 7vw, 96px);
  color:#fff;
  max-width:900px;
}
.headline .amber{ color:var(--amber); }

.sub{
  margin-top:18px;
  font-family:'Archivo';
  font-weight:400;
  font-size:clamp(13px, 1.4vw, 16px);
  letter-spacing:0.04em;
  color:rgba(255,255,255,0.72);
  max-width:620px;
}

/* Enter button + skip */
.actions{
  margin-top:40px;
  display:flex; align-items:center; gap:16px;
  flex-wrap:wrap; justify-content:center;
}
.enter{
  display:inline-flex; align-items:center; gap:14px;
  background:var(--amber); color:var(--ink);
  font-family:'Archivo'; font-weight:700;
  text-transform:uppercase; letter-spacing:0.14em;
  font-size:12px;
  padding:18px 26px;
  border:0; cursor:pointer;
  transition:background .25s, transform .3s cubic-bezier(.2,.8,.2,1);
}
.enter:hover{ background:var(--amberl); }
.enter:hover .arr{ transform:translateX(6px); }
.enter .arr{ transition: transform .3s cubic-bezier(.2,.8,.2,1); font-size:16px; line-height:1; }

.skip{
  background:transparent; border:0; color:rgba(255,255,255,0.6);
  font-family:'Archivo'; font-weight:700;
  text-transform:uppercase; letter-spacing:0.18em;
  font-size:11px; cursor:pointer;
  padding:10px 16px;
  border-bottom:1px solid rgba(255,255,255,0.25);
  transition: color .25s, border-color .25s;
}
.skip:hover{ color:#fff; border-color:#fff; }

.mute{
  position:absolute; z-index:7;
  top:44px; right:calc(44px + 180px);
  width:36px; height:36px;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition:background .25s, border-color .25s;
}
.mute:hover{ background:rgba(0,0,0,0.6); border-color:rgba(255,255,255,0.4); }
.mute svg{ width:16px; height:16px; color:rgba(255,255,255,0.8); }
@media (max-width:640px){ .mute{ top:30px; right:auto; left:30px; } }

/* Progress bar */
.progress{
  position:absolute; z-index:6; left:0; right:0; bottom:0;
  height:2px; background:rgba(255,255,255,0.08);
}
.progress .bar{
  height:100%;
  background:var(--amber);
  width:0%;
  animation: fill 8s linear forwards;
}
@keyframes fill{ to{ width:100% } }

/* Scan line */
.scan{
  position:absolute; z-index:5; left:0; right:0; top:0;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(235,117,38,0.9), transparent);
  animation: scan 8s linear infinite;
}
@keyframes scan{
  0%{ top:0; opacity:0 }
  10%{ opacity:1 }
  90%{ opacity:1 }
  100%{ top:100%; opacity:0 }
}

@media (prefers-reduced-motion: reduce){
  .bgvid{ display:none; }
  .stage{ background:url('images/hero.jpg') center/cover no-repeat; }
  .center{ animation:none; opacity:1; }
  .progress .bar{ animation:none; width:100%; }
  .scan{ display:none; }
}
</style>
</head>
<body>

<main class="stage" role="main" aria-label="Border Groundwork &amp; Construction intro">
  <video class="bgvid" autoplay muted loop playsinline preload="auto" poster="images/hero.jpg" id="introVid">
    <source src="video/intro.mp4" type="video/mp4">
  </video>

  <div class="vignette"></div>
  <div class="grain"></div>

  <div class="frame" aria-hidden="true"></div>
  <span class="bracket tl" aria-hidden="true"></span>
  <span class="bracket tr" aria-hidden="true"></span>
  <span class="bracket bl" aria-hidden="true"></span>
  <span class="bracket br" aria-hidden="true"></span>
  <div class="scan" aria-hidden="true"></div>

  <div class="meta tl" aria-hidden="true">
    <span class="dot"></span>
    Now recording · Site 04
  </div>
  <div class="meta tr" aria-hidden="true">Carlisle · Cumbria · Scottish Borders</div>
  <div class="meta bl" aria-hidden="true">54°53'N · 02°56'W</div>
  <div class="meta br" aria-hidden="true">BG / Reel 001</div>

  <button id="muteBtn" class="mute" aria-label="Unmute video">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
  </button>

  <div class="center">
    <div class="logo-badge">
      <img src="images/logo.jpg" alt="Border Groundwork &amp; Construction logo">
    </div>
    <div class="eyebrow">// Border Groundwork &amp; Construction</div>
    <h1 class="headline">From drawing<br/><span class="amber">to done.</span></h1>
    <p class="sub">Groundworks, foundations, drainage and driveways across Carlisle, Cumbria &amp; the Scottish Borders.</p>

    <div class="actions">
      <button class="enter" id="enterBtn" type="button">
        Enter Site <span class="arr">→</span>
      </button>
      <button class="skip" id="skipBtn" type="button">Skip intro</button>
    </div>
  </div>

  <div class="progress"><div class="bar"></div></div>
</main>

<script>
const goto = (skipAnim) => { window.location.replace('home.html'); };
document.getElementById('enterBtn').addEventListener('click', () => goto(true));
document.getElementById('skipBtn').addEventListener('click', () => goto(true));

// Auto-forward after video ends (~8s) + safety timeout
const vid = document.getElementById('introVid');
vid.addEventListener('ended', () => goto(false));
setTimeout(() => goto(false), 9500);

// Mute toggle — requires user gesture to unmute
const muteBtn = document.getElementById('muteBtn');
muteBtn.addEventListener('click', () => {
  vid.muted = !vid.muted;
  muteBtn.setAttribute('aria-label', vid.muted ? 'Unmute video' : 'Mute video');
  muteBtn.style.borderColor = vid.muted ? 'rgba(255,255,255,0.15)' : 'var(--amber)';
});

// Allow Esc / Enter / Space to skip
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'Enter' || e.key === ' ') { e.preventDefault(); goto(true); }
});

// Remember user preference — skip intro on subsequent visits in the same session
try {
  if (sessionStorage.getItem('bg_intro_seen') === '1') goto(true);
  else sessionStorage.setItem('bg_intro_seen', '1');
} catch {}
</script>

</body>
</html>
